model = "gpt-5.3-codex"
model_provider = "openai"
review_model = "gpt-5.3-codex"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"
personality = "pragmatic"

# Keep context small and compact earlier than default.
model_context_window = 200000
model_auto_compact_token_limit = 120000
tool_output_token_limit = 4000
project_doc_max_bytes = 32768
ignore_large_untracked_files = true
ignore_large_untracked_dirs = true
ignore_untracked_files_over_bytes = 2097152
large_untracked_dir_warning_threshold = 200

[shell_environment_policy]
inherit = "core"

[history]
persistence = "save-all"
max_bytes = 5242880
file_opener = "vscode"

[features]
enable_request_compression = true
plugins = false
multi_agent = true
tool_suggest = false
skill_mcp_dependency_install = false
shell_snapshot = false
runtime_metrics = false
general_analytics = false
unified_exec = false
apply_patch_freeform = false
view_image_tool = false
js_repl = false
js_repl_tools_only = false

[profiles.default-worker]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"

[profiles.orchestrator]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"

[profiles.advisor]
model = "gpt-5.4"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
model_verbosity = "medium"
approval_policy = "untrusted"
sandbox_mode = "read-only"
web_search = "disabled"

[profiles.worker-fast]
model = "gpt-5.4-mini"
model_reasoning_effort = "low"
model_reasoning_summary = "concise"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"

[profiles.worker-tests]
model = "gpt-5.2"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
