model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"

[mcp_servers.playwright]
enabled = false

[mcp_servers.Sanity]
enabled = false

[plugins."cloudflare@openai-curated"]
enabled = false

